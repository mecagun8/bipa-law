<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIPA 법률 AI 어시스턴트</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚖️</span>
          <span class="logo-text">BIPA Law</span>
        </div>
        <p class="logo-sub">법률 AI 어시스턴트</p>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <span>+ 새 대화</span>
      </button>

      <div class="sidebar-section">
        <p class="sidebar-label">빠른 질문</p>
        <button class="quick-btn" data-q="근로기준법에서 연차휴가 규정을 알려주세요.">📅 연차휴가 규정</button>
        <button class="quick-btn" data-q="개인정보보호법 위반 시 과태료 기준은 무엇인가요?">🔒 개인정보보호법</button>
        <button class="quick-btn" data-q="하도급법에서 원사업자의 의무는 무엇인가요?">🏗️ 하도급법 의무</button>
        <button class="quick-btn" data-q="공정거래법 위반 사례 판례를 검색해주세요.">📋 공정거래 판례</button>
        <button class="quick-btn" data-q="전자상거래법에서 청약철회 규정을 설명해주세요.">🛒 청약철회</button>
      </div>

      <div class="sidebar-footer">
        <p>⚠️ 본 서비스는 참고용입니다.<br>중요한 법적 판단은 전문가와 상담하세요.</p>
      </div>
    </aside>

    <!-- 메인 채팅 영역 -->
    <main class="chat-area">
      <header class="chat-header">
        <h1>법령 검색 AI</h1>
        <p class="chat-header-sub">법제처 데이터 기반 · Claude AI 구동</p>
      </header>

      <div class="messages" id="messages">
        <div class="welcome">
          <div class="welcome-icon">⚖️</div>
          <h2>안녕하세요, BIPA 법률 AI입니다</h2>
          <p>법령 검색, 판례 조회, 법령 해석 등 법률 관련 질문을 도와드립니다.<br>궁금한 내용을 자유롭게 질문해 주세요.</p>
          <div class="welcome-chips">
            <span class="chip" data-q="근로기준법 퇴직금 지급 기준을 알려주세요.">퇴직금 규정</span>
            <span class="chip" data-q="공정거래법 위반 과징금 기준은 무엇인가요?">공정거래 과징금</span>
            <span class="chip" data-q="개인정보보호법에서 정보주체의 권리는 무엇인가요?">개인정보 권리</span>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="법령, 판례, 규정에 대해 질문하세요..."
            rows="1"
            maxlength="2000"
          ></textarea>
          <button id="sendBtn" class="send-btn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</p>
      </div>
    </main>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
